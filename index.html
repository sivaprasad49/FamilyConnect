<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-title" content="FamilyConnect">

<title>FamilyConnect</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:#FFF8F5;
    color:#2D2D2D;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* Header */
  .header{
    background:linear-gradient(135deg,#E8634A,#F4845F);
    padding:24px 16px 16px;
    text-align:center;
    box-shadow:0 2px 16px rgba(232,99,74,0.25);
  }
  .header .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
  .header .logo svg{width:32px;height:32px}
  .header h1{font-size:20px;font-weight:800;letter-spacing:2px;color:#fff}
  .header .tagline{font-size:12px;color:rgba(255,255,255,0.85);font-weight:500;margin-top:2px}


  /* Filters */
  .filters{
    position:sticky;top:0;z-index:10;
    background:#FFF8F5;
    padding:12px 16px;
    border-bottom:1px solid #F0E0D8;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
  }
  .filter-row{display:flex;gap:8px;margin-bottom:10px}
  .filter-row:last-child{margin-bottom:0}

  .btn{border:none;border-radius:12px;cursor:pointer;font-weight:600;transition:all .2s;font-family:inherit}

  /* Name buttons */
  .name-btn{flex:1;padding:10px 0;font-size:15px;border-radius:12px}
  .name-btn.active{background:#E8634A;color:#fff;box-shadow:0 3px 12px rgba(232,99,74,0.3)}
  .name-btn:not(.active){background:#FDE8E4;color:#C4553E}

  /* Day buttons */
  .day-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .day-scroll::-webkit-scrollbar{display:none}
  .day-btn{flex-shrink:0;padding:8px 12px;font-size:12px;font-weight:600;border-radius:10px;min-width:56px;text-align:center}
  .day-btn.active{background:#E8634A;color:#fff;box-shadow:0 2px 8px rgba(232,99,74,0.25)}
  .day-btn:not(.active){background:#FDE8E4;color:#B5604E}
  .day-btn .label{font-size:9px;margin-top:2px;opacity:.7;font-weight:500}

  /* Type buttons */
  .type-btn{flex:1;padding:8px 0;font-size:12px;font-weight:600;border-radius:10px}
  .type-btn:not(.active){background:#F5EDE8;color:#8B7B72}
  .type-btn.active[data-t="All"]{background:#E8634A;color:#fff}
  .type-btn.active[data-t="Yoga"]{background:#7C5CBF;color:#fff}
  .type-btn.active[data-t="Breathing"]{background:#3D9970;color:#fff}
  .type-btn.active[data-t="Exercise"]{background:#C4841D;color:#fff}

  /* Content */
  .content{padding:16px}

  .day-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .day-header .emoji{font-size:22px}
  .day-header h2{font-size:22px;font-weight:800;color:#2D2D2D}
  .day-header .tag{font-size:12px;color:#E8634A;font-weight:700;background:#FDE8E4;padding:2px 10px;border-radius:20px;margin-left:4px}

  /* Cards */
  .card{margin-bottom:20px;border-radius:16px;overflow:hidden;border:1.5px solid;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
  .card.Yoga{background:#F8F3FF;border-color:#D4BFF0}
  .card.Breathing{background:#EEFBF5;border-color:#A8E6CC}
  .card.Exercise{background:#FFF7ED;border-color:#F0C78A}

  .card-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  .card.Yoga .card-head{border-bottom:1px solid #E8D8F8}
  .card.Breathing .card-head{border-bottom:1px solid #C8EDDB}
  .card.Exercise .card-head{border-bottom:1px solid #F0DDB8}

  .card-type{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
  .card.Yoga .card-type{color:#7C5CBF}
  .card.Breathing .card-type{color:#3D9970}
  .card.Exercise .card-type{color:#C4841D}

  .card-title{font-size:16px;font-weight:700;color:#2D2D2D;margin-top:3px}
  .card-time{font-size:11px;color:#8B7B72;text-align:right;white-space:nowrap;font-weight:500}

  .card-note{padding:8px 16px;font-size:12px;color:#7B6B60;font-style:italic}
  .card.Yoga .card-note{background:rgba(124,92,191,0.06);border-bottom:1px solid #E8D8F8}
  .card.Breathing .card-note{background:rgba(61,153,112,0.06);border-bottom:1px solid #C8EDDB}
  .card.Exercise .card-note{background:rgba(196,132,29,0.06);border-bottom:1px solid #F0DDB8}

  .card-body{padding:12px 16px}

  .item{padding:8px 0;font-size:14px;line-height:1.6;color:#3D3D3D;border-bottom:1px solid rgba(0,0,0,0.05)}
  .item:last-child{border-bottom:none}
  .item.sub{color:#6B7280;font-style:italic;padding-left:16px;font-size:13px}
  .item.warn{color:#B45309;font-size:13px;font-weight:500}
  .item .num{font-weight:700;margin-right:8px;font-size:13px}
  .card.Yoga .num{color:#7C5CBF}
  .card.Breathing .num{color:#3D9970}
  .card.Exercise .num{color:#C4841D}

  /* Section blocks (for exercise) */
  .sec-head{padding:8px 12px;background:rgba(0,0,0,0.03);border-radius:10px;font-size:13px;font-weight:700;margin-bottom:8px;letter-spacing:.3px}
  .card.Yoga .sec-head{color:#7C5CBF}
  .card.Breathing .sec-head{color:#3D9970}
  .card.Exercise .sec-head{color:#C4841D}

  .sec-block{margin-bottom:16px}
  .sec-block:last-child{margin-bottom:0}

  .sec-item{padding:6px 8px;font-size:13px;line-height:1.6;color:#3D3D3D;border-bottom:1px solid rgba(0,0,0,0.04)}
  .sec-item:last-child{border-bottom:none}
  .sec-item.sub{color:#6B7280;font-style:italic;padding-left:16px}
  .sec-item.warn{color:#B45309;font-weight:500}

  /* Footer */
  .footer{padding:20px 16px 12px;text-align:center}
  .footer .pain{font-size:11px;color:#8B7B72;margin-bottom:12px}
  .footer .brand{font-size:11px;color:#B5A69E;font-weight:500}
  .footer .brand strong{color:#E8634A;font-weight:700}

  /* Safe area for notched phones */
  @supports(padding-top: env(safe-area-inset-top)){
    .header{padding-top:calc(24px + env(safe-area-inset-top))}
    .footer{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
  }
</style>
</head>

function render(){
  const d=DATA[state.name];

  // Name buttons
  let nh="";
  NAMES.forEach(n=>{nh+=`<button class="btn name-btn ${state.name===n?"active":""}" onclick="setState('name','${n}')">${n}</button>`});
  document.getElementById("nameRow").innerHTML=nh;

  // Day buttons
  let dh="";
  DAYS.forEach(dy=>{dh+=`<button class="btn day-btn ${state.day===dy?"active":""}" onclick="setState('day','${dy}')"><div>${dayShort[dy]}</div><div class="label">${dayTag[dy]}</div></button>`});
  document.getElementById("dayRow").innerHTML=dh;

  // Type buttons
  let th="";
  ["All",...TYPES].forEach(t=>{
    const em=t==="All"?"\u{1f4cb}":typeEmoji[t];
    th+=`<button class="btn type-btn ${state.type===t?"active":""}" data-t="${t}" onclick="setState('type','${t}')">${em} ${t}</button>`;
  });
  document.getElementById("typeRow").innerHTML=th;

  // Content
  const dayData=d.days[state.day];
  const types=state.type==="All"?TYPES:[state.type];
  let html=`<div class="day-header"><span class="emoji">${dayEmoji[state.day]}</span><div><h2>${state.day}</h2></div><span class="tag">${dayTag[state.day]}</span></div>`;

  types.forEach(t=>{
    const sec=dayData[t];
    if(!sec)return;
    html+=`<div class="card ${t}"><div class="card-head"><div><div class="card-type">${typeEmoji[t]} ${t.toUpperCase()}</div><div class="card-title">${sec.title}</div></div><div class="card-time">${sec.time}</div></div>`;
    if(sec.note) html+=`<div class="card-note">${sec.note}</div>`;
    html+=`<div class="card-body">`;

    if(sec.items){
      let num=0;
      sec.items.forEach((item,i)=>{
        const isSub=item.startsWith("  \u21b3");
        const isWarn=item.startsWith("\u26a0\ufe0f");
        const cls=isSub?"item sub":isWarn?"item warn":"item";
        if(!isSub&&!isWarn) num++;
        const prefix=(!isSub&&!isWarn)?`<span class="num">${num}.</span>`:"";
        html+=`<div class="${cls}">${prefix}${item}</div>`;
      });
    }

    if(sec.sections){
      sec.sections.forEach(s=>{
        html+=`<div class="sec-block"><div class="sec-head">${s.name}</div>`;
        s.items.forEach((item,i)=>{
          const isSub=item.startsWith("  \u21b3");
          const isWarn=item.startsWith("\u26a0\ufe0f");
          const cls=isSub?"sec-item sub":isWarn?"sec-item warn":"sec-item";
          html+=`<div class="${cls}">${item}</div>`;
        });
        html+=`</div>`;
      });
    }

    html+=`</div></div>`;
  });

  document.getElementById("content").innerHTML=html;

  // Scroll active day button into view
  setTimeout(()=>{
    const activeDay=document.querySelector(".day-btn.active");
    if(activeDay) activeDay.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  },50);
}

function setState(key,val){state[key]=val;render()}

// Register Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

render();
</script>
</body>
</html>
