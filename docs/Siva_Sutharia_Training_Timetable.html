function render(){
  const d=DATA[state.name];
  document.getElementById("personInfo").textContent=d.info;

  // Name buttons
  let nh="";
  NAMES.forEach(n=>{nh+=`<button class="btn name-btn ${state.name===n?"active":""}" onclick="setState('name','${n}')">${n}</button>`});
  document.getElementById("nameRow").innerHTML=nh;

  // Day buttons
  let dh="";
  DAYS.forEach(dy=>{dh+=`<button class="btn day-btn ${state.day===dy?"active":""}" onclick="setState('day','${dy}')"><div>${dayShort[dy]}</div><div class="label">${dayTag[dy]}</div></button>`});
  document.getElementById("dayRow").innerHTML=dh;

  // Type buttons
  let th="";
  ["All",...TYPES].forEach(t=>{
    const em=t==="All"?"📋":typeEmoji[t];
    th+=`<button class="btn type-btn ${state.type===t?"active":""}" data-t="${t}" onclick="setState('type','${t}')">${em} ${t}</button>`;
  });
  document.getElementById("typeRow").innerHTML=th;

  // Content
  const dayData=d.days[state.day];
  const types=state.type==="All"?TYPES:[state.type];
  let html=`<div class="day-header"><span class="emoji">${dayEmoji[state.day]}</span><div><h2>${state.day}</h2><span class="tag">${dayTag[state.day]}</span></div></div>`;

  types.forEach(t=>{
    const sec=dayData[t];
    if(!sec)return;
    html+=`<div class="card ${t}"><div class="card-head"><div><div class="card-type">${typeEmoji[t]} ${t.toUpperCase()}</div><div class="card-title">${sec.title}</div></div><div class="card-time">${sec.time}</div></div>`;
    if(sec.note) html+=`<div class="card-note">${sec.note}</div>`;
    html+=`<div class="card-body">`;

    if(sec.items){
      let num=0;
      sec.items.forEach((item,i)=>{
        const isSub=item.startsWith("  ↳");
        const isWarn=item.startsWith("⚠️");
        const cls=isSub?"item sub":isWarn?"item warn":"item";
        if(!isSub&&!isWarn) num++;
        const prefix=(!isSub&&!isWarn)?`<span class="num">${num}.</span>`:"";
        html+=`<div class="${cls}">${prefix}${item}</div>`;
      });
    }

    if(sec.sections){
      sec.sections.forEach(s=>{
        html+=`<div class="sec-block"><div class="sec-head">${s.name}</div>`;
        s.items.forEach((item,i)=>{
          const isSub=item.startsWith("  ↳");
          const isWarn=item.startsWith("⚠️");
          const cls=isSub?"sec-item sub":isWarn?"sec-item warn":"sec-item";
          html+=`<div class="${cls}">${item}</div>`;
        });
        html+=`</div>`;
      });
    }

    html+=`</div></div>`;
  });

  document.getElementById("content").innerHTML=html;

  // Scroll active day button into view
  setTimeout(()=>{
    const activeDay=document.querySelector(".day-btn.active");
    if(activeDay) activeDay.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  },50);
}

function setState(key,val){state[key]=val;render()}

render();
</script>
